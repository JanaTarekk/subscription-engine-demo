<div class="dashboard">

  <div class="header">
    <h1>Subscription Dashboard</h1>
    <p>Manage your active subscription and billing details.</p>
  </div>

  <div class="subscription-card">

    <div class="card-header">
      <h2>Pro Plan</h2>
      <span class="status active">Active</span>
    </div>

    <div class="details">

      <div class="detail">
        <span class="label">Monthly Price</span>
        <span class="value">250 EGP</span>
      </div>

      <div class="detail">
        <span class="label">Billing Cycle</span>
        <span class="value">Monthly</span>
      </div>

      <div class="detail">
        <span class="label">Started On</span>
        <span class="value">24 June 2026</span>
      </div>

      <div class="detail">
        <span class="label">Next Billing Date</span>
        <span class="value">24 July 2026</span>
      </div>

    </div>

    <div class="actions">
      <button class="primary-btn">
        Update Payment Method
      </button>

      <button class="secondary-btn">
        Cancel Subscription
      </button>
    </div>

  </div>

</div>
